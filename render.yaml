services:
  - type: web
    name: atom-os-api
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: atom-os-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: BCRYPT_ROUNDS
        value: "12"
      - key: LOG_LEVEL
        value: info
      - key: FRONTEND_URL
        value: https://atom-os.onrender.com
      - key: DEFAULT_GYM_NAME
        value: Atom OS
      - key: SUPER_ADMIN_NAME
        sync: false
      - key: SUPER_ADMIN_EMAIL
        sync: false
      - key: SUPER_ADMIN_PASSWORD
        sync: false

  - type: web
    name: atom-os-app
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_API_URL
        value: https://atom-os-api.onrender.com/api

databases:
  - name: atom-os-db
    databaseName: atom_os
    user: atom_os
    plan: free
