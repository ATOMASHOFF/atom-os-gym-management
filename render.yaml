# ─────────────────────────────────────────────────────────────
# ATOM FITNESS — Render.com Deployment Config
# Deploy: push to main → Render auto-deploys
# Dashboard: https://dashboard.render.com
# ─────────────────────────────────────────────────────────────

services:
  # ── Backend API ─────────────────────────────────────────────
  - type: web
    name: atom-fitness-api
    runtime: node
    rootDir: backend
    buildCommand: npm ci --only=production
    startCommand: node server.js
    plan: starter          # $7/month — upgrade to standard for production
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: atom-fitness-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true    # Render auto-generates a secure secret
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: FRONTEND_URL
        value: https://atom-fitness-app.onrender.com
      - key: LOG_LEVEL
        value: info
      - key: BCRYPT_ROUNDS
        value: "12"
    autoDeploy: true

  # ── Frontend Static Site ────────────────────────────────────
  - type: web
    name: atom-fitness-app
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: build
    headers:
      - path: /static/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /index.html
        name: Cache-Control
        value: no-store
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_API_URL
        value: https://atom-fitness-api.onrender.com/api
    autoDeploy: true

# ── Managed PostgreSQL ──────────────────────────────────────
databases:
  - name: atom-fitness-db
    databaseName: atom_fitness_db
    user: atom_user
    plan: starter           # $7/month — includes daily backups
    postgresMajorVersion: 16
