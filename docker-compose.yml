# ─────────────────────────────────────────────────────────────
# ATOM FITNESS — Local Development Stack
# Usage: docker-compose up
# ─────────────────────────────────────────────────────────────
version: "3.9"

services:
  # ── PostgreSQL ──────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: atom_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: atom_fitness_db
      POSTGRES_USER: atom_user
      POSTGRES_PASSWORD: atom_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/config/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atom_user -d atom_fitness_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Backend API ─────────────────────────────────────────────
  api:
    build:
      context: ./backend
      target: runner
    container_name: atom_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 5000
      DATABASE_URL: postgresql://atom_user:atom_dev_password@db:5432/atom_fitness_db
      JWT_SECRET: dev-secret-change-this-in-production-must-be-32-chars
      JWT_EXPIRES_IN: 7d
      FRONTEND_URL: http://localhost:3000
      LOG_LEVEL: debug
      BCRYPT_ROUNDS: 10
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules  # Preserve container's node_modules
    command: npx nodemon server.js

  # ── Frontend ────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      target: builder
    container_name: atom_frontend
    restart: unless-stopped
    depends_on:
      - api
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm start
    stdin_open: true
    tty: true

volumes:
  postgres_data:
    driver: local
