name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ── Backend ───────────────────────────────────────────────
  backend:
    name: Backend CI
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: atom_test_db
          POSTGRES_USER: atom_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://atom_user:test_password@localhost:5432/atom_test_db
      JWT_SECRET: test-jwt-secret-minimum-32-characters-long-for-ci
      JWT_EXPIRES_IN: 1h
      FRONTEND_URL: http://localhost:3000
      LOG_LEVEL: error
      BCRYPT_ROUNDS: "4"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm install

      - name: Check syntax
        working-directory: backend
        run: |
          find . -name "*.js" -not -path "*/node_modules/*" \
            -exec node --check {} \; && echo "✅ No syntax errors"

  # ── Frontend ──────────────────────────────────────────────
  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Build
        working-directory: frontend
        env:
          REACT_APP_API_URL: https://atom-fitness-api-production.up.railway.app/api
          CI: false
        run: npm run build

      - name: Bundle size
        working-directory: frontend
        run: |
          BUILD_SIZE=$(du -sh build/ | cut -f1)
          echo "📦 Bundle size: $BUILD_SIZE"

  # ── Security audit ────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Audit backend
        working-directory: backend
        run: npm audit --audit-level=high || echo "⚠️ Review audit output"
      - name: Audit frontend
        working-directory: frontend
        run: npm audit --audit-level=high || echo "⚠️ Review audit output"
