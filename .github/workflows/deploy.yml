name: Deploy

on:
  push:
    branches: [main, master]

jobs:
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Notify deploy
        run: echo "✅ Pushed to main — Railway auto-deploys on push"
